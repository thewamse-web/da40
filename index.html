<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAX 40 Eagle Eye Scanner</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #131722; color: #d1d4dc; margin: 0; padding: 10px; overflow: hidden; }
        .layout { display: grid; grid-template-columns: 400px 1fr; gap: 10px; height: 98vh; }
        .sidebar { background: #1e222d; border-radius: 8px; border: 1px solid #363c4e; display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
        .main-content { display: flex; flex-direction: column; gap: 10px; overflow: hidden; }
        .chart-container { flex-grow: 1; background: #1e222d; border-radius: 8px; border: 1px solid #363c4e; overflow: hidden; }
        .refresh-btn { background-color: #2962ff; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        h3 { color: #2962ff; margin: 0 0 10px 0; text-align: center; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #363c4e; cursor: pointer; }
        tr:hover { background-color: #2a2e39; }
        .up { color: #00ff88; }
        .down { color: #ff3333; }
    </style>
</head>
<body>

<div class="layout">
    <div class="sidebar">
        <h3>DAX 40 Live Scanner</h3>
        <button class="refresh-btn" onclick="fetchFinnhubData()">🔄 OPDATER SCANNER</button>
        <table id="stockTable">
            <thead>
                <tr>
                    <th>Aktie</th>
                    <th>Pris</th>
                    <th>Ændring %</th>
                </tr>
            </thead>
            <tbody id="stockList">
                <!-- Her lander aktierne -->
            </tbody>
        </table>
    </div>

    <div class="main-content">
        <div class="chart-container" id="tv_chart_container">
            <!-- Diagrammet indlæses her -->
        </div>
        <div id="tech_summary_container" style="height: 200px; background: #1e222d; border-radius: 8px; border: 1px solid #363c4e;"></div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const API_KEY = 'd82nn1hr01qmgc0gr7dgd82nn1hr01qmgc0gr7e0';
    const DAX_SYMBOLS = ["ADS.DE", "ALV.DE", "BAS.DE", "BAYN.DE", "BMW.DE", "DBK.DE", "DTE.DE", "EOAN.DE", "IFX.DE", "SAP.DE", "SIE.DE", "VOW3.DE"];

    // 1. Funktion til at indlæse diagram (bruger XETR for at undgå fejlen i billede.png)
    function loadChart(symbol) {
        const cleanSymbol = symbol.replace('.DE', '');
        new TradingView.widget({
            "autosize": true,
            "symbol": "XETR:" + cleanSymbol,
            "interval": "15",
            "timezone": "Europe/Berlin",
            "theme": "dark",
            "style": "1",
            "locale": "da_DK",
            "studies": ["RSI@tv-basicstudies", "MACD@tv-basicstudies", "Volume@tv-basicstudies"],
            "container_id": "tv_chart_container"
        });
        loadSummary(cleanSymbol);
    }

    // 2. Teknisk opsummering (RSI/MACD status)
    function loadSummary(symbol) {
        document.getElementById('tech_summary_container').innerHTML = '';
        const script = document.createElement('script');
        script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
        script.async = true;
        script.innerHTML = JSON.stringify({
            "interval": "15m",
            "width": "100%",
            "height": "100%",
            "symbol": "XETR:" + symbol,
            "showIntervalTabs": true,
            "locale": "da_DK",
            "colorTheme": "dark"
        });
        document.getElementById('tech_summary_container').appendChild(script);
    }

    // 3. Hent data fra Finnhub og sorter efter din strategi
    async function fetchFinnhubData() {
        const list = document.getElementById('stockList');
        list.innerHTML = '<tr><td colspan="3" style="text-align:center;">Henter kurser...</td></tr>';
        
        let stockData = [];

        for (const sym of DAX_SYMBOLS) {
            try {
                const response = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${API_KEY}`);
                const data = await response.json();
                if (data.c) {
                    stockData.push({ symbol: sym, price: data.c, change: data.dp });
                }
            } catch (e) { console.error(e); }
        }

        // Sortering: Dem der er faldet mest rykkes øverst (potentiale for RSI vending)
        stockData.sort((a, b) => a.change - b.change);

        list.innerHTML = '';
        stockData.forEach(stock => {
            const row = document.createElement('tr');
            row.onclick = () => loadChart(stock.symbol);
            row.innerHTML = `
                <td><strong>${stock.symbol.replace('.DE', '')}</strong></td>
                <td>${stock.price.toFixed(2)} €</td>
                <td class="${stock.change >= 0 ? 'up' : 'down'}">${stock.change.toFixed(2)}%</td>
            `;
            list.appendChild(row);
        });
    }

    // Start programmet
    fetchFinnhubData();
    loadChart("DAX");
</script>

</body>
</html>
